syntax = "proto3";

import "citescoop/proto/language.proto";

package wikiopencite.proto;

enum FileType {
  FILE_TYPE_UNSPECIFIED = 0;
  FILE_TYPE_PAGES = 1;
  FILE_TYPE_REVISIONS = 2;
  FILE_TYPE_OPENALEX_WORKS = 3;
  FILE_TYPE_OPENALEX_INSTITUTIONS = 4;
  FILE_TYPE_OPENALEX_AUTHORS = 5;
}

message DumpFileAdditionalData {
  Language language = 1;
}

message FileHeader {
  reserved 1, 2, 3;

  optional FileType type = 4;
  optional uint64 count = 5;

  oneof additional_data {
    DumpFileAdditionalData dump_file = 6;
  }
}
